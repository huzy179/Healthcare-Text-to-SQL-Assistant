base_model: Qwen/Qwen2.5-Coder-7B-Instruct
dataset_path: datasets/text_to_sql/train.jsonl
validation_path: datasets/text_to_sql/validation.jsonl
output_dir: finetune/outputs/lora_adapter

training:
  method: qlora
  epochs: 3
  learning_rate: 0.0002
  max_seq_length: 2048
  batch_size: 2
  gradient_accumulation_steps: 8

lora:
  r: 16
  alpha: 32
  dropout: 0.05
