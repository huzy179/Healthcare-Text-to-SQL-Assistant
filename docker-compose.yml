services:
  postgres:
    image: postgres:16
    container_name: healthcare_text_to_sql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/synthea_csv:/data/synthea_csv:ro
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare_user} -d ${POSTGRES_DB:-healthcare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: healthcare_text_to_sql_mcp
    profiles:
      - mcp
    environment:
      DATABASE_URL: postgresql://${POSTGRES_READONLY_USER:-healthcare_readonly}:${POSTGRES_READONLY_PASSWORD:-readonly_password}@postgres:5432/${POSTGRES_DB:-healthcare}
      MCP_QUERY_TIMEOUT_MS: ${MCP_QUERY_TIMEOUT_MS:-30000}
      MCP_MAX_ROWS: ${MCP_MAX_ROWS:-200}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: false

  eval:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    profiles:
      - eval
    environment:
      DATABASE_URL: postgresql://${POSTGRES_READONLY_USER:-healthcare_readonly}:${POSTGRES_READONLY_PASSWORD:-readonly_password}@postgres:5432/${POSTGRES_DB:-healthcare}
      MCP_QUERY_TIMEOUT_MS: ${MCP_QUERY_TIMEOUT_MS:-30000}
      MCP_MAX_ROWS: ${MCP_MAX_ROWS:-200}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://vllm:8000/v1}
      LLM_API_KEY: ${LLM_API_KEY:-local}
      LLM_MODEL: ${LLM_MODEL:-qwen-coder-3b}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-192}
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
      - ./outputs:/app/outputs
    command: ["python", "scripts/evaluate_text_to_sql.py"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: healthcare_text_to_sql_frontend
    profiles:
      - frontend
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      DATABASE_URL: postgresql://${POSTGRES_READONLY_USER:-healthcare_readonly}:${POSTGRES_READONLY_PASSWORD:-readonly_password}@postgres:5432/${POSTGRES_DB:-healthcare}
      MCP_QUERY_TIMEOUT_MS: ${MCP_QUERY_TIMEOUT_MS:-30000}
      MCP_MAX_ROWS: ${MCP_MAX_ROWS:-200}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  vllm:
    image: vllm/vllm-openai:latest
    container_name: healthcare_text_to_sql_vllm
    profiles:
      - vllm
    ipc: host
    shm_size: 8g
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      VLLM_WSL2_ENABLE_PIN_MEMORY: ${VLLM_WSL2_ENABLE_PIN_MEMORY:-1}
      VLLM_WEIGHT_OFFLOADING_DISABLE_UVA: ${VLLM_WEIGHT_OFFLOADING_DISABLE_UVA:-1}
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-Coder-3B-Instruct-AWQ}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-qwen-coder-3b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --dtype
      - auto
      - --api-key
      - ${VLLM_API_KEY:-local}
      - --generation-config
      - vllm
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-2048}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.85}
      - --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres_data:
