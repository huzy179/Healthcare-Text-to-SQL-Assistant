services:
  postgres:
    image: postgres:16
    container_name: healthcare_text_to_sql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/synthea_csv:/data/synthea_csv:ro
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare_user} -d ${POSTGRES_DB:-healthcare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: healthcare_text_to_sql_mcp
    profiles:
      - mcp
    environment:
      DATABASE_URL: postgresql://${POSTGRES_READONLY_USER:-healthcare_readonly}:${POSTGRES_READONLY_PASSWORD:-readonly_password}@postgres:5432/${POSTGRES_DB:-healthcare}
      MCP_QUERY_TIMEOUT_MS: ${MCP_QUERY_TIMEOUT_MS:-30000}
      MCP_MAX_ROWS: ${MCP_MAX_ROWS:-200}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: false

  eval:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    profiles:
      - eval
    environment:
      DATABASE_URL: postgresql://${POSTGRES_READONLY_USER:-healthcare_readonly}:${POSTGRES_READONLY_PASSWORD:-readonly_password}@postgres:5432/${POSTGRES_DB:-healthcare}
      MCP_QUERY_TIMEOUT_MS: ${MCP_QUERY_TIMEOUT_MS:-30000}
      MCP_MAX_ROWS: ${MCP_MAX_ROWS:-200}
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
      - ./outputs:/app/outputs
    command: ["python", "scripts/evaluate_text_to_sql.py"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: healthcare_text_to_sql_frontend
    profiles:
      - frontend
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_READONLY_USER:-healthcare_readonly}:${POSTGRES_READONLY_PASSWORD:-readonly_password}@postgres:5432/${POSTGRES_DB:-healthcare}
      MCP_QUERY_TIMEOUT_MS: ${MCP_QUERY_TIMEOUT_MS:-30000}
      MCP_MAX_ROWS: ${MCP_MAX_ROWS:-200}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
